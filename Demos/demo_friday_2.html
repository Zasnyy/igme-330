        const add = (a, b) => a + b;

        const addSeveral = (a, b, c, d = 0) => {
            return a + b + c + d;
        }

        const addSeveralMore = (nums) => {
            let sum = 0;
            for (let i = 0; i < nums.length; i++) {
                sum += nums[i];
            }
            return sum;
        }

        console.log(addSeveral(1, 2, 3, 4));
