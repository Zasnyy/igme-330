<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <canvas width="600" height="430"></canvas>

    <script>
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');

        const width = canvas.width;
        const height = canvas.height;

        const rect = ({
            x, y,
            width, height,
            style: {
                fill: fillStyle,
                stroke: strokeStyle,
                strokeWidth: lineWidth
            }
        }) => {
            ctx.save();
            ctx.beginPath();

            ctx.rect(x, y, width, height);

            ctx.fillStyle = fillStyle;
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth;
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        };

        const drawRotatedRect = (thisRect) => {
            const {
                pos: [x, y], 
                width: rectWidth, 
                height: rectHeight, 
                rotation, 
                color
            } = thisRect;

            ctx.save();

            ctx.translate(x + rectWidth / 2, y + rectHeight / 2);
            ctx.rotate(rotation);
            ctx.translate(-(x + rectWidth / 2), -(y + rectHeight / 2));

            rect({
                x: x, y: y,
                width: rectWidth, height: rectHeight,
                style: {
                    fill: color,
                    stroke: "black",
                    strokeWidth: 3
                }
            });
            ctx.restore();
        };

        let rotation = 1;
        let rotationPerSecond = 1;

        const theRects = [
            { 
                pos: [0, 0], 
                width: 50, 
                height: 50, 
                rotation: 0, 
                color: 'black' 
            },
            { pos: [100, 100], width: 100, height: 50, rotation: 0, color: 'blue' },
            { pos: [300, 100], height: 500, width: 10, rotation: 0, color: 'ochre' }
        ];

        let mousePos = [0, 0];
        canvas.addEventListener('mousemove', (evt) => {
            mousePos = [evt.offsetX, evt.offsetY];
        });


        const update = (deltaT) => {
            // rotation += rotationPerSecond * deltaT;
            for (let i = 0; i < theRects.length; i++) {
                const thisRect = theRects[i];

                thisRect.rotation += rotationPerSecond * deltaT;
            }

            // theRects[0].pos[0] = mousePos[0];
            // theRects[0].pos[1] = mousePos[1];

            theRects[0].pos[0] = theRects[0].pos[0] + .01 * (mousePos[0] - theRects[0].pos[0]);
            theRects[0].pos[1] = theRects[0].pos[1] + .01 * (mousePos[1] - theRects[0].pos[1]);
        };

        const draw = () => {
            ctx.save();

            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < theRects.length; i++) {
                const thisRect = theRects[i];

                drawRotatedRect(thisRect);
            }

            ctx.restore();
        };

        let lastTs = 0;
        const step = (ts) => {
            let deltaT = (ts - lastTs) / 1000;
            lastTs = ts;

            update(deltaT);
            draw();

            requestAnimationFrame(step);
        };

        requestAnimationFrame(step);



    </script>
</body>

</html>
