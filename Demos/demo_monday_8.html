<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <canvas width="600" height="430"></canvas>

    <script>
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');

        const width = canvas.width;
        const height = canvas.height;

        const state = {
            avatarMovement: [0, 0],
            whichRect: 0
        };

        const rect = ({
            x, y,
            width, height,
            rotation,
            style: {
                fill: fillStyle,
                stroke: strokeStyle,
                strokeWidth: lineWidth
            }
        }) => {
            ctx.save();
            ctx.beginPath();

            ctx.translate(x + width / 2, y + height / 2);
            ctx.rotate(rotation);
            ctx.translate(-(x + width / 2), -(y + height / 2));
            ctx.rect(x, y, width, height);

            ctx.fillStyle = fillStyle;
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth;
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        };

        let mousePos = [0, 0];
        canvas.addEventListener('mousemove', (evt) => {
            mousePos = [evt.offsetX, evt.offsetY];
        });

        let isWPressed = false;
        let isAPressed = false;
        let isSPressed = false;
        let isDPressed = false;
        let isSpacePressed = false;
        document.addEventListener('keydown', (evt) => {
            const key = evt.key;
            if (key === 'w') isWPressed = true;
            if (key === 'a') isAPressed = true;
            if (key === 's') isSPressed = true;
            if (key === 'd') isDPressed = true;
            if (key === ' ') isSpacePressed = true;
        });

        document.addEventListener('keyup', (evt) => {
            const key = evt.key;
            if (key === 'w') isWPressed = false;
            if (key === 'a') isAPressed = false;
            if (key === 's') isSPressed = false;
            if (key === 'd') isDPressed = false;
            if (key === ' ') isSpacePressed = false;

            if (key === ' ') {
                theRects[state.whichRect].animStart = performance.now();
                theRects[state.whichRect].startRotation = theRects[state.whichRect].rotation;
                theRects[state.whichRect].targetRotation = theRects[state.whichRect].rotation + Math.PI / 4;
            }
        });

        const theRects = [
            {
                pos: [0, 0],
                width: 50,
                height: 50,
                rotation: 0,
                targetRotation: 0,
                rotationDuration: 2000,
                startRotation: 0,
                animStart: 0,
                color: 'black'
            },
            { pos: [100, 100], width: 100, height: 50, rotation: 0, targetRotation: 0, rotationDuration: 2000, animStart: 0, color: 'blue' },
            { pos: [300, 100], height: 500, width: 10, rotation: 0, targetRotation: 0, rotationDuration: 2000, animStart: 0, color: 'ochre' }
        ];

        const update = (deltaT, state) => {
            const { avatarMovement, whichRect } = state;

            const thisRect = theRects[whichRect];

            thisRect.pos[0] += avatarMovement[0];
            thisRect.pos[1] += avatarMovement[1];

            let now = performance.now();
            if (now - thisRect.animStart <= thisRect.rotationDuration) {
                let progress = (now - thisRect.animStart) / thisRect.rotationDuration;
                
                thisRect.rotation = thisRect.startRotation + progress * (thisRect.targetRotation - thisRect.startRotation);
            }
        };

        const draw = () => {
            ctx.save();

            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < theRects.length; i++) {
                const thisRect = theRects[i];

                rect({
                    x: thisRect.pos[0],
                    y: thisRect.pos[1],
                    width: thisRect.width,
                    height: thisRect.height,
                    rotation: thisRect.rotation,
                    style: {
                        fill: thisRect.color,
                        stroke: "black",
                        strokeWidth: 3
                    }
                });
            }

            ctx.restore();
        };

        let lastTs = 0;
        const step = (ts) => {
            let deltaT = (ts - lastTs) / 1000;
            lastTs = ts;

            let speed = 100;

            state.avatarMovement = [0, 0];
            if (isWPressed) state.avatarMovement[1] += -speed * deltaT;
            if (isSPressed) state.avatarMovement[1] += speed * deltaT;
            if (isAPressed) state.avatarMovement[0] += -speed * deltaT;
            if (isDPressed) state.avatarMovement[0] += speed * deltaT;

            // if (isSpacePressed) state.whichRect = (state.whichRect + 1) % theRects.length;

            update(deltaT, state);
            draw();

            console.log(isWPressed, isAPressed, isSPressed, isDPressed);

            requestAnimationFrame(step);
        };

        requestAnimationFrame(step);

    </script>
</body>

</html>
